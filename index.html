<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attraction Cursor Component</title>
  
  <!-- Import Montserrat font to match your CSS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body, html, #app {
      margin: 0;
      width: 100%;
      height: 100%;
    }

    body {
      touch-action: none;
    }

    #app {
      height: 100%;
      font-family: "Montserrat", serif;
      position: relative;
    }

    #canvas {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      overflow: hidden;
      z-index: 1;
    }

    .buttons {
      position: fixed;
      width: 100%;
      bottom: 15px;
      z-index: 2;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
    }

    button, a {
      color: black;
      font-family: "Montserrat", serif;
      font-size: 12px;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.5);
      border-radius: 5px;
      border: 1px solid grey;
      padding: 4px 8px;
      cursor: pointer;
      backdrop-filter: blur(4px); /* Optional: Adds a nice frosted glass effect to the buttons */
    }
    
    button:hover, a:hover {
      background: rgba(255, 255, 255, 0.8);
    }
  </style>
</head>
<body>

  <div id="app">
    <canvas id="canvas"></canvas>
    <div class="buttons">
      <button type="button" id="colors-btn">
        Random colors
      </button>
    </div>
  </div>

  <!-- Note: type="module" is strictly required here for the import statement to work -->
  <script type="module">
    // Licence CC BY-NC-SA 4.0
    // Attribution — You must give appropriate credit.
    // NonCommercial — You may not use the material for commercial purposes.

    import AttractionCursor from "https://cdn.jsdelivr.net/npm/threejs-components@0.0.26/build/cursors/attraction1.min.js"

    const app = AttractionCursor(document.getElementById('canvas'), {
      particles: {
        attractionIntensity: 0.75,
        size: 1.5,  
      },
    })

    const button1 = document.getElementById('colors-btn')

    button1.addEventListener('click', () => {
      app.particles.light1.color.set(Math.random() * 0xffffff)
      app.particles.light2.color.set(Math.random() * 0xffffff)
    })
  </script>

</body>
</html>
